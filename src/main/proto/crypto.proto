syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.eruditsioon.ncripterquantumsafe.infrastructure.adapter.in.grpc";
option java_outer_classname = "CryptoProto";

service CryptoService {
  rpc GenerateKeyPair (GenerateKeyPairRequest) returns (GenerateKeyPairResponse);
  rpc GetPublicKey (GetPublicKeyRequest) returns (GetPublicKeyResponse);
  rpc Encapsulate (EncapsulateRequest) returns (EncapsulateResponse);
  rpc DecapsulateAndDecrypt (DecapsulateAndDecryptRequest) returns (DecapsulateAndDecryptResponse);
}

message GenerateKeyPairRequest {
  string key_label = 1;
  string parameter_set = 2; // e.g. "ML_KEM_768"
  string out_format = 3;    // e.g. "der", "pem", "x509-pem"
}

message GenerateKeyPairResponse {
  string key_label = 1;
  string parameter_set = 2;
  string status = 3;
  string public_key = 4; // public key data in requested format
}

message GetPublicKeyRequest {
  string key_label = 1;
  string out_format = 2;
}

message GetPublicKeyResponse {
  string public_key = 1;
  string format = 2;
  string encoding = 3;
}

message EncapsulateRequest {
  string key_label = 1;
}

message EncapsulateResponse {
  string encapsulation_b64 = 1;
  string shared_secret_b64 = 2;
}

message DecapsulateAndDecryptRequest {
  string key_label = 1;
  string encapsulation_b64 = 2;
  string iv_b64 = 3;
  string cryptogram_b64 = 4;
}

message DecapsulateAndDecryptResponse {
  string plaintext_b64 = 1;
}
